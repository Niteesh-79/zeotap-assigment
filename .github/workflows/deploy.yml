name: Zeotap SRE Deploy
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - name: Terraform Apply
        id: apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve
          # We save the IP to a physical file instead of a variable
          terraform output -raw public_ip > ip_address.txt

      - name: Ansible Deploy
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 400 key.pem
          
          CLEAN_IP=$(cat ip_address.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
          
          echo "Connecting to clean IP: $CLEAN_IP"
          sleep 60
          
          ansible-playbook -i "$CLEAN_IP," --private-key key.pem -u ubuntu playbook.yml
