name: Zeotap SRE Deploy
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - name: Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: \${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: \${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve
          echo "PUBLIC_IP=\$(terraform output -raw public_ip)" >> \$GITHUB_ENV

      - name: Ansible Deploy
        run: |
          echo "\${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 400 key.pem
          sleep 30
          scp -i key.pem -o StrictHostKeyChecking=no index.html ubuntu@\${{ env.PUBLIC_IP }}:/home/ubuntu/
          ansible-playbook -i "\${{ env.PUBLIC_IP }}," --private-key key.pem -u ubuntu playbook.yml
